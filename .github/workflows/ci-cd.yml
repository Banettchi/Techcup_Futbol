name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dosw-Project1
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar proyecto
        run: mvn compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: Dosw-Project1
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ejecutar pruebas
        run: mvn verify

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Dosw-Project1
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Construir JAR
        run: mvn package -DskipTests

      - name: Desplegar a Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Tech'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'Dosw-Project1/target/*.jar'
